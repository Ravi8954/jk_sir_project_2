name: githubaction trigger practice
on:
  push:
    branches:
      - main
      pull_request:
        branches:
          - develop
          - main

jobs:
terraform_init_plan:
name: Terraform Init and Plan
runs-on: ubuntu-latest
steps:
- name: Terraform Setup
uses: hashicorp/setup-terraform@v
with:
terraform_version:
- name: Checkout Repository
  uses: actions/checkout@v6.0.3
- name: terraform init
  run: terraform init
- name: terraform validate
  run: terraform validate




- name: terraform plan
run: terraform plan

